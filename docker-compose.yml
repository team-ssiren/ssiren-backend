services:
  postgres:
    build:
      context: ./docker/postgres
    container_name: ssiren-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssiren}
      POSTGRES_USER: ${POSTGRES_USER:-ssiren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssiren}
    ports:
      - "15432:5432"
    volumes:
      - ssiren-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ssiren-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: ssiren-backend
    mem_limit: 512m
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ssiren}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ssiren}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ssiren}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: >-
        -XX:InitialRAMPercentage=50.0
        -XX:MaxRAMPercentage=75.0
        -XX:+ExitOnOutOfMemoryError
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  ssiren-db-data:
