spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:ssiren-backend/.env[.properties]
  application:
    name: ssiren
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:250MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/ssiren}
    username: ${SPRING_DATASOURCE_USERNAME:ssiren}
    password: ${SPRING_DATASOURCE_PASSWORD:ssiren}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_EXPIRY:1800000}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:604800000}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

ai:
  client:
    base-url: ${AI_BASE_URL:http://localhost:8000}
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:3000}
    response-timeout-ms: ${AI_RESPONSE_TIMEOUT_MS:30000}

kakao:
  local:
    rest-api-key: ${KAKAO_REST_API_KEY:}
    base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
    connect-timeout-ms: ${KAKAO_LOCAL_CONNECT_TIMEOUT_MS:3000}
    response-timeout-ms: ${KAKAO_LOCAL_RESPONSE_TIMEOUT_MS:5000}

cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT:${AWS_ENDPOINT_URL_S3:}}
    access-key-id: ${R2_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
    bucket: ${R2_BUCKET:${AWS_BUCKET_S3:}}
    public-url: ${R2_PUBLIC_URL:}
    region: ${R2_REGION:${AWS_DEFAULT_REGION:auto}}
