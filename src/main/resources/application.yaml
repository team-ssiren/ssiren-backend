spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:ssiren-backend/.env[.properties]
  application:
    name: ssiren
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/ssiren}
    username: ${SPRING_DATASOURCE_USERNAME:ssiren}
    password: ${SPRING_DATASOURCE_PASSWORD:ssiren}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_EXPIRY:1800000}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:604800000}

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

chatbot:
  ai-base-url: ${CHATBOT_AI_BASE_URL:http://localhost:8000}
