name: Notify PR to Mattermost

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR opened notification to Mattermost
        if: github.event.action != 'closed'
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO_NAME: ${{ github.repository }}
        run: |
          curl -X POST "$MATTERMOST_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📢 [Backend] PR이 열렸습니다. 확인해주세요!\n\n**Repository**: ${REPO_NAME}\n**Title**: ${PR_TITLE}\n**Author**: ${PR_AUTHOR}\n**Branch**: ${PR_HEAD} -> ${PR_BASE}\n**Link**: ${PR_URL}\"
            }"

      - name: Send PR merged notification to Mattermost
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO_NAME: ${{ github.repository }}
        run: |
          curl -X POST "$MATTERMOST_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"✅ [Backend] PR이 머지되었습니다.\n\n**Repository**: ${REPO_NAME}\n**Title**: ${PR_TITLE}\n**Author**: ${PR_AUTHOR}\n**Branch**: ${PR_HEAD} -> ${PR_BASE}\n**Link**: ${PR_URL}\"
            }"

      - name: Send PR closed notification to Mattermost
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO_NAME: ${{ github.repository }}
        run: |
          curl -X POST "$MATTERMOST_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚫 [Backend] PR이 닫혔습니다.\n\n**Repository**: ${REPO_NAME}\n**Title**: ${PR_TITLE}\n**Author**: ${PR_AUTHOR}\n**Branch**: ${PR_HEAD} -> ${PR_BASE}\n**Link**: ${PR_URL}\"
            }"
